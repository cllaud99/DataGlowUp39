version: '3.8'

services:
  db:
    image: pgduckdb/pgduckdb:16-main
    container_name: pgduckdb
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    env_file:
      - .env
    restart: always

volumes:
  pg_data:
